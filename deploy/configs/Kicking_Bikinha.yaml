policy:
  policy_path: "./models/kicking_bikinha.pt"
  num_actions: 12
  num_observations: 53

  # Approach command parameters (match training env rewards config)
  approach_stop_dist: 0.5   # [m] — zero commands when closer than this
  approach_max_speed: 1.0   # [m/s] — cap on approach walk speed
  approach_yaw_gain: 0.3    # [rad/s per rad] — yaw correction gain

  normalization:
    gravity: 1.0
    lin_vel: 1.0
    ang_vel: 1.0
    dof_pos: 1.0
    dof_vel: 0.1
    clip_actions: 1.0
    ball_pos: 1.0
    target_dir: 1.0
    target_z: 1.0
    target_distance: 0.1

  kick_target_ref_distance: 8.0  # [m] distance used when vision is not available

  control:
    action_scale: 1.0
    decimation: 10

mech:
  parallel_mech_indexes: [15, 16, 21, 22]

